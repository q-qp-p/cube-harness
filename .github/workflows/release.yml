name: Release and Publish to PyPI

on:
  push:
    tags:
      - 'cube-harness/v*'
      - 'cubes/*/v*'

jobs:
  create-github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Idempotent: skip if release already exists (e.g. workflow re-run)
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, skipping."
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi

  publish-cube-harness:
    needs: create-github-release
    if: startsWith(github.ref, 'refs/tags/cube-harness/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-cube:
    needs: create-github-release
    if: startsWith(github.ref, 'refs/tags/cubes/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve package directory
        id: pkg
        run: |
          # Tag format: cubes/<package-name>/v1.2.3
          TAG="${GITHUB_REF#refs/tags/}"
          PKG_NAME=$(echo "$TAG" | cut -d'/' -f2)
          PKG_DIR="cubes/$PKG_NAME"
          if [ ! -f "$PKG_DIR/pyproject.toml" ]; then
            echo "ERROR: $PKG_DIR/pyproject.toml not found. Is the tag correct?"
            exit 1
          fi
          echo "name=$PKG_NAME" >> "$GITHUB_OUTPUT"
          echo "dir=$PKG_DIR" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build package
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ steps.pkg.outputs.dir }}/dist
