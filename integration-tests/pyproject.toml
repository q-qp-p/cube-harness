[project]
name = "cube-integration-tests"
version = "0.1.0"
description = "End-to-end integration tests for CUBE infra backends + benchmark cubes"
requires-python = ">=3.12"
dependencies = ["cube-standard", "pytest>=8.0"]

[tool.uv]
# Override transitive `cube-standard` URL so that packages pulled from PyPI
# (e.g. `cube-vm-backend` via `osworld-cube`) defer to our local path pin.
override-dependencies = [
    "cube-standard @ file:///${PROJECT_ROOT}/../../cube-standard",
]
# Each backend's dependency tree (aws/azure/daytona) pulls different transitive
# constraints; declaring them as conflicts lets uv resolve one group at a time.
# aws/azure groups conflict with the local-path-pinned `cube-standard` used by
# local/daytona/toolkit (they pull it from git via osworld-cube/webarena).  The
# three local groups share the same local cube-standard and can coexist.
conflicts = [
    [{group = "aws"}, {group = "local"}],
    [{group = "aws"}, {group = "daytona"}],
    [{group = "aws"}, {group = "toolkit"}],
    [{group = "aws"}, {group = "modal"}],
    [{group = "azure"}, {group = "local"}],
    [{group = "azure"}, {group = "daytona"}],
    [{group = "azure"}, {group = "toolkit"}],
    [{group = "azure"}, {group = "modal"}],
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["cube_integration_tests"]

[dependency-groups]
aws = [
    "cube-infra-aws",
    "osworld-cube",
    "webarena-verified-cube",
]
azure = [
    "cube-infra-azure",
    "osworld-cube",
    "webarena-verified-cube",
]
local = [
    "terminalbench-cube",
    "swebench-verified-cube",
    "swebench-live-cube",
    "docker>=7.1.0",
    "tenacity>=9.1.4",
]
daytona = [
    "cube-infra-daytona",
    "terminalbench-cube",
    "swebench-verified-cube",
    "swebench-live-cube",
]
toolkit = [
    "cube-infra-toolkit",
    "terminalbench-cube",
    "swebench-verified-cube",
    "swebench-live-cube",
]
modal = [
    "cube-infra-modal",
    "terminalbench-cube",
    "swebench-verified-cube",
    "swebench-live-cube",
]
dev = [
    "pytest-xdist>=3.8.0",
]

[tool.uv.sources]
# Local path pin for cube-standard unblocks pre-release changes to core (e.g.
# LocalDockerServiceHandle.container).  Drop once an rc6 is published.
cube-standard = { path = "../../cube-standard", editable = true }
# aws/azure/daytona all come from the same local cube-standard workspace so their
# `cube-standard` transitive dep resolves to the same URL (avoids uv conflicts).
cube-infra-aws = { path = "../../cube-standard/cube-resources/cube-infra-aws", editable = true }
cube-infra-azure = { path = "../../cube-standard/cube-resources/cube-infra-azure", editable = true }
cube-infra-daytona = { path = "../../cube-standard/cube-resources/cube-infra-daytona", editable = true }
cube-infra-toolkit = { path = "../../cube-standard/cube-resources/cube-infra-toolkit", editable = true }
cube-infra-modal = { path = "../../cube-standard/cube-resources/cube-infra-modal", editable = true }
cube-vm-backend = { path = "../../cube-standard/cube-resources/cube-vm-backend", editable = true }
osworld-cube = { path = "../cubes/osworld-cube", editable = true }
webarena-verified-cube = { path = "../cubes/webarena-verified", editable = true }
terminalbench-cube = { path = "../cubes/terminalbench-cube", editable = true }
swebench-verified-cube = { path = "../cubes/swebench-verified-cube", editable = true }
swebench-live-cube = { path = "../cubes/swebench-live-cube", editable = true }
