[project]
name = "cube-integration-tests"
version = "0.1.0"
description = "End-to-end integration tests for CUBE infra backends + benchmark cubes"
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
aws = [
    "cube-infra-aws",
    "osworld-cube",
    "webarena-verified-cube",
]
azure = [
    "cube-infra-azure",
    "osworld-cube",
    "webarena-verified-cube",
]

[tool.uv.sources]
cube-infra-aws = { path = "../../cube-standard/cube-resources/cube-infra-aws", editable = true }
cube-infra-azure = { path = "../../cube-standard/cube-resources/cube-infra-azure", editable = true }
osworld-cube = { path = "../cubes/osworld-cube", editable = true }
webarena-verified-cube = { path = "../cubes/webarena-verified", editable = true }
